<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiftRhythm 설치</title>
<meta name="theme-color" content="#15171c">
<style>
:root { --bg:#15171c; --fg:#f2f4f7; --dim:#a7b0bd; --accent:#5b82ff; --card:#1d2026; --border:#2a2f37; }
* { box-sizing:border-box; margin:0; padding:0; }
html,body { background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Pretendard","Noto Sans KR",sans-serif; -webkit-font-smoothing:antialiased; line-height:1.6; }
.wrap { max-width:480px; margin:0 auto; padding:56px 24px 80px; text-align:center; }
.logo { width:84px; height:84px; border-radius:20px; background:linear-gradient(135deg,#5b82ff,#2dd4cc); display:inline-flex; align-items:center; justify-content:center; font-size:42px; margin-bottom:20px; }
h1 { font-size:30px; font-weight:700; letter-spacing:-0.5px; margin-bottom:6px; }
.sub { color:var(--dim); font-size:15px; margin-bottom:36px; }
.btn { display:block; background:var(--accent); color:#fff; font-size:19px; font-weight:700; padding:18px; border-radius:16px; text-decoration:none; margin-bottom:16px; }
.btn:active { opacity:.85; }
.note { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; text-align:left; font-size:14px; color:var(--dim); margin-top:28px; }
.note b { color:var(--fg); }
.note ol { margin:8px 0 0 18px; } .note li { margin-bottom:6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🌗</div>
  <h1>ShiftRhythm</h1>
  <p class="sub">교대근무 생체시계 가이드 · 베타</p>

  <a class="btn" href="itms-services://?action=download-manifest&url=https://yoonspower.github.io/shiftrhythm/app/manifest.plist">📲 아이폰에 설치</a>

  <div class="note">
    <b>설치 방법</b>
    <ol>
      <li>이 페이지를 <b>아이폰 Safari</b>에서 여세요(다른 브라우저는 안 됩니다).</li>
      <li>위 <b>‘아이폰에 설치’</b>를 누르고 “설치” 확인.</li>
      <li>홈 화면에 ShiftRhythm 아이콘이 생기면 끝. 첫 실행 시 바로 열립니다.</li>
    </ol>
    <p style="margin-top:12px;">※ 등록된 기기(김재윤의 iPhone)에서만 설치됩니다. 설치가 안 보이면 홈 화면을 잠시 기다렸다가 새로고침하세요.</p>
  </div>
</div>
</body>
</html>
