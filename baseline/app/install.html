<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베이스라인 웰니스 설치</title>
<meta name="theme-color" content="#0f1424">
<style>
:root { --bg:#0f1424; --fg:#f2f4f7; --dim:#a7b0bd; --accent:#3878f5; --card:#171d30; --border:#283149; }
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Pretendard","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6;}
.wrap{max-width:480px;margin:0 auto;padding:56px 24px 80px;text-align:center;}
.logo{width:88px;height:88px;border-radius:22px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;}
.logo svg{width:54px;height:54px;}
h1{font-size:30px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
.sub{color:var(--dim);font-size:15px;margin-bottom:36px;}
.btn{display:block;background:var(--accent);color:#fff;font-size:19px;font-weight:700;padding:18px;border-radius:16px;text-decoration:none;margin-bottom:16px;}
.btn:active{opacity:.85;}
.note{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:left;font-size:14px;color:var(--dim);margin-top:28px;}
.note b{color:var(--fg);} .note ol{margin:8px 0 0 18px;} .note li{margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#fff" stroke-width="6"/><path d="M30 52 H52 L68 40" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="68" cy="40" r="5" fill="#fff"/></svg></div>
  <h1>베이스라인 웰니스</h1>
  <p class="sub">내 몸의 평소를 아는 해석 레이어 · 베타</p>

  <a class="btn" href="itms-services://?action=download-manifest&url=https://yoonspower.github.io/baseline/app/manifest.plist">📲 아이폰에 설치</a>

  <div class="note">
    <b>설치 안내</b>
    <ol>
      <li>이 페이지를 <b>아이폰 Safari</b>에서 열어주세요(다른 브라우저 X).</li>
      <li>위 <b>설치</b> 버튼 → "설치하시겠습니까?" 확인.</li>
      <li>설치 후 첫 실행 시: 설정 → 일반 → VPN 및 기기 관리 → 개발자 앱 <b>신뢰</b>.</li>
      <li>앱 열고 <b>건강 데이터 연결</b> 허용 → 실제 데이터로 점수·추세 확인.</li>
    </ol>
    <p style="margin-top:12px;">등록된 기기에서만 설치됩니다. AI 코칭은 현재 템플릿(서버 연결 전).</p>
  </div>
</div>
</body>
</html>
