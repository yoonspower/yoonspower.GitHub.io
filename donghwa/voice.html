<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>동화 낭독 샘플</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:24px; padding:32px; text-align:center;
    font-family:-apple-system,"SF Pro Rounded",system-ui,sans-serif; color:#f5f3ff;
    background:linear-gradient(180deg,#2b294d,#36305e 40%,#161333); }
  .moon{font-size:60px}
  h1{font-size:23px;margin:0}
  .card{background:rgba(255,255,255,.07);border-radius:22px;padding:20px;width:100%;max-width:340px}
  .card h2{font-size:17px;margin:0 0 6px}
  .card p{font-size:13px;color:#b8b3d0;margin:0 0 12px}
  audio{width:100%}
  .note{font-size:12px;color:#9b95b8;max-width:340px;line-height:1.7}
</style>
</head>
<body>
  <div class="moon">🌙</div>
  <h1>한국어 낭독 샘플</h1>
  <div class="card">
    <h2>유나 (표준 음성)</h2>
    <p>iOS 기본 한국어 음성 계열</p>
    <audio controls preload="none" src="sample_yuna.m4a"></audio>
  </div>
  <div class="card">
    <h2>할머니 음성</h2>
    <p>포근한 잠자리 톤</p>
    <audio controls preload="none" src="sample_grandma.m4a"></audio>
  </div>
  <p class="note">맥 음성 기준이라 iOS 프리미엄/Siri 한국어 음성을 쓰면 이보다 더 자연스럽습니다. 속도는 잠자리에 맞춰 느리게 설정했어요.</p>
</body>
</html>
